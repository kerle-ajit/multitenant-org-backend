services:
  app:
    build: .
    container_name: mt-app
    restart: always
    command: npm run start
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/multitenant?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: test_user
      SMTP_PASS: test_pass
    ports:
      - "4000:4000"

  worker:
    build: .
    container_name: mt-worker
    restart: always
    command: npm run worker:start
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/multitenant?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: test_user
      SMTP_PASS: test_pass

  postgres:
    image: postgres:15
    container_name: mt-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multitenant
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mt-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pg_data: